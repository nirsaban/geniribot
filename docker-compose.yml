# Phase 0 infra: Postgres + Redis only.
# App services (web / gateway / worker) get added in Phase 1 once they exist.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kesher
      POSTGRES_PASSWORD: kesher
      POSTGRES_DB: kesher
    ports:
      - "55432:5432"
    volumes:
      - kesher_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kesher -d kesher"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - kesher_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kesher_pg:
  kesher_redis:
