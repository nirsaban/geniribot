# Kesher nginx server blocks — inserted into /root/miluim/nginx/nginx.conf
# (inside the http { } block, before its final closing brace) by
# infra/deploy-public.sh. Mirrors the sabanenglish (Yalla) host-proxy pattern.
# Web app runs on the host at :4000; nginx container reaches it via the
# miltech-association-net gateway 172.22.0.1.

    # ---- kesher.miltech.cloud  (Kesher — WhatsApp lead-bot SaaS) ----
    server {
        listen 80;
        server_name kesher.miltech.cloud;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ---- kesher.miltech.cloud  HTTPS (-> host :4000) ----
    server {
        listen 443 ssl;
        http2 on;
        server_name kesher.miltech.cloud;

        ssl_certificate     /etc/letsencrypt/live/kesher.miltech.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kesher.miltech.cloud/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:KesherSSL:10m;

        client_max_body_size 10M;

        location / {
            proxy_pass http://172.22.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
